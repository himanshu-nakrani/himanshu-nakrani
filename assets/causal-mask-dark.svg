    .tick { stroke: #d29922; }
    .cellb { fill: #7d97ee; }
    .cella { fill: #d29922; }
    .fade { opacity: 0; animation: fadein 0.8s cubic-bezier(0.33,0,0.2,1) forwards; }
    .d0 { animation-delay: 0.05s; }
    .r0 { animation-delay: 0.35s; }
    .r1 { animation-delay: 0.55s; }
    .r2 { animation-delay: 0.75s; }
    .r3 { animation-delay: 0.95s; }
    .r4 { animation-delay: 1.15s; }
    .r5 { animation-delay: 1.35s; }
    .r6 { animation-delay: 1.55s; }
    .r7 { animation-delay: 1.75s; }
    .r8 { animation-delay: 1.95s; }
    .r9 { animation-delay: 2.15s; }
    .s0 { animation-delay: 2.7s; }
    .s1 { animation-delay: 3.0s; }
    .s2 { animation-delay: 3.3s; }
    .s3 { animation-delay: 3.8s; }
    .s4 { animation-delay: 4.4s; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .fade { animation: none; opacity: 1; }
    }
  </style>

