<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 258" width="880" height="258" role="img" aria-labelledby="t">
  <title id="t">A 10-by-10 causal attention matrix fills in row by row: lower-triangular cells hold weights, upper-triangle cells stay empty at minus infinity. Annotated with the masked softmax formula and the mask definition.</title>
