    <text class="txt" x="560" y="99" font-size="12">j &#8804; i</text>
    <text class="txt" x="512" y="117" font-size="12">&#8722;&#8734;</text>
    <text class="txt" x="560" y="117" font-size="12">j &gt; i</text>
    <text class="txt" x="628" y="117" font-size="10.5" opacity="0.7">(softmax &#8594; 0)</text>
  </g>
  <g class="fade s4">
    <text class="txt" x="440" y="174" font-size="10.5" opacity="0.75">each row of softmax(&#183;) sums to 1</text>
    <text class="txt" x="440" y="192" font-size="10.5" opacity="0.75">a token attends to its past, never its future</text>
