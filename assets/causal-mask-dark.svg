  <!-- the math -->
  <g class="fade s2">
    <text class="txt" x="440" y="69" font-size="12">attn(Q, K, V) = softmax( QK<tspan dy="-4.5" font-size="9">T</tspan><tspan dy="4.5">/&#8730;d</tspan><tspan dy="3" font-size="9">k</tspan><tspan dy="-3"> + M )&#183;V</tspan></text>
