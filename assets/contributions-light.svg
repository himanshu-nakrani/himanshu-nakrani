<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" role="img" aria-labelledby="t2">
  <title id="t2">A 52-week bar chart of GitHub contributions, July 2025 to July 2026: thirty-five near-silent weeks, an annotated ignition point in mid-March 2026, then a steep ramp peaking at 354 contributions in the week of June 28.</title>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .txt { fill: #6e7781; }
    .ink { stroke: #6e7781; }
    .stubs rect { fill: #4f6ad0; fill-opacity: 0.35; }
    .bar {
      stroke: #4f6ad0; stroke-width: 10.5; stroke-linecap: butt;
      animation: rise 0.55s cubic-bezier(0.2,0.6,0.25,1) forwards;
    }
    .fade { opacity: 0; animation: fadein 0.7s cubic-bezier(0.33,0,0.2,1) forwards; }
    .dotf { fill: #bf8700; }
    .ring { stroke: #bf8700; fill: none; }
    .d0 { animation-delay: 0.05s; }
    .ds { animation-delay: 0.35s; }
    .di { animation-delay: 2.4s;  }
    .dp { animation-delay: 3s;    }
    .dl { animation-delay: 3.25s; }
    @keyframes rise   { to { stroke-dashoffset: 0; } }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .bar  { animation: none; stroke-dashoffset: 0; }
      .fade { animation: none; opacity: 1; }
      .ring { display: none; }
    }
  </style>

  <!-- frame: gridlines, axes, ticks, tick labels -->
  <g class="fade d0">
    <g class="ink" stroke-width="0.75" opacity="0.22">
      <line x1="56.5" y1="65.5" x2="824" y2="65.5"/>
      <line x1="56.5" y1="110.5" x2="824" y2="110.5"/>
      <line x1="56.5" y1="155.5" x2="824" y2="155.5"/>
    </g>
    <g class="ink" stroke-width="1" opacity="0.8">
      <line x1="56.5" y1="36" x2="56.5" y2="200.5"/>
      <line x1="56.5" y1="200.5" x2="824" y2="200.5"/>
    </g>
    <g class="ink" stroke-width="1" opacity="0.8">
      <line x1="51" y1="65.5" x2="56.5" y2="65.5"/>
      <line x1="51" y1="110.5" x2="56.5" y2="110.5"/>
      <line x1="51" y1="155.5" x2="56.5" y2="155.5"/>
      <line x1="64.0" y1="200.5" x2="64.0" y2="206"/>
      <line x1="238.0" y1="200.5" x2="238.0" y2="206"/>
      <line x1="426.5" y1="200.5" x2="426.5" y2="206"/>
      <line x1="615.0" y1="200.5" x2="615.0" y2="206"/>
      <line x1="803.5" y1="200.5" x2="803.5" y2="206"/>
    </g>
    <g class="txt" font-size="9" opacity="0.75" text-anchor="end">
      <text x="47" y="68.5">300</text>
      <text x="47" y="113.5">200</text>
      <text x="47" y="158.5">100</text>
      <text x="47" y="203.5">0</text>
    </g>
    <text class="txt" x="64.0" y="220" font-size="9.5" text-anchor="middle" opacity="0.75">jul &#8217;25</text>
    <text class="txt" x="238.0" y="220" font-size="9.5" text-anchor="middle" opacity="0.75">oct</text>
    <text class="txt" x="426.5" y="220" font-size="9.5" text-anchor="middle" opacity="0.75">jan &#8217;26</text>
    <text class="txt" x="615.0" y="220" font-size="9.5" text-anchor="middle" opacity="0.75">apr</text>
    <text class="txt" x="803.5" y="220" font-size="9.5" text-anchor="middle" opacity="0.75">jul</text>
    <text class="txt" x="52" y="24" font-size="11" letter-spacing="1.5">contributions / wk</text>
    <text class="txt" x="824" y="24" font-size="9" letter-spacing="1" text-anchor="end" opacity="0.65">n = 2,085 &#183; 52 wk</text>
  </g>

  <!-- silent weeks: 33 zero-weeks, one quiet field of 1px stubs -->
