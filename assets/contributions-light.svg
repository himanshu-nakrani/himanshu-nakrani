  <!-- ignition annotation, in the manner of fig. 1's stage markers -->
  <g class="fade di">
    <line class="ink" x1="571.5" y1="48" x2="571.5" y2="200.5" stroke-width="0.75" stroke-dasharray="3 4" opacity="0.5"/>
    <text class="txt" x="577.5" y="58" font-size="11" letter-spacing="2" opacity="0.9">ignition</text>
    <text class="txt" x="577.5" y="71" font-size="9" letter-spacing="1.5" opacity="0.65">mar &#8217;26</text>
  </g>

  <!-- peak point + annotation -->
  <circle class="dotf fade dp" cx="794.25" cy="41.2" r="3.2"/>
  <circle class="ring" cx="794.25" cy="41.2" r="3.5" stroke-width="1" opacity="0">
    <animate attributeName="r" values="3.5;12" keyTimes="0;1" dur="2s" begin="3.2s" repeatCount="1" calcMode="spline" keySplines="0.25 0 0.4 1"/>
    <animate attributeName="opacity" values="0.55;0" keyTimes="0;1" dur="2s" begin="3.2s" repeatCount="1" calcMode="spline" keySplines="0.25 0 0.4 1"/>
  </circle>
  <g class="fade dl">
    <line class="ink" x1="779.0" y1="41.2" x2="787.0" y2="41.2" stroke-width="0.75" opacity="0.6"/>
    <text class="txt" x="775.0" y="45.0" font-size="11.5" text-anchor="end">peak &#183; 354</text>
    <text class="txt" x="775.0" y="60.0" font-size="10.5" text-anchor="end" opacity="0.75">wk of jun 28</text>
  </g>
</svg>
