    <rect x="339.5" y="199.5" width="10.5" height="1"/>
    <rect x="354.0" y="199.5" width="10.5" height="1"/>
    <rect x="368.5" y="199.5" width="10.5" height="1"/>
    <rect x="383.0" y="199.5" width="10.5" height="1"/>
    <rect x="397.5" y="199.5" width="10.5" height="1"/>
    <rect x="412.0" y="199.5" width="10.5" height="1"/>
