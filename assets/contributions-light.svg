    <rect x="513.5" y="199.5" width="10.5" height="1"/>
    <rect x="528.0" y="199.5" width="10.5" height="1"/>
    <rect x="557.0" y="199.5" width="10.5" height="1"/>
  </g>

  <!-- the series: 19 active weeks rising left to right (0.45px per contribution) -->
  <g>
    <line class="bar" style="animation-delay:0.5s"  x1="98.25"  y1="200.5" x2="98.25"  y2="199.6"  stroke-dasharray="0.9"   stroke-dashoffset="0.9"/>
    <line class="bar" style="animation-delay:0.62s" x1="547.75" y1="200.5" x2="547.75" y2="196.9"  stroke-dasharray="3.6"   stroke-dashoffset="3.6"/>
    <line class="bar" style="animation-delay:0.75s" x1="576.75" y1="200.5" x2="576.75" y2="178.0"  stroke-dasharray="22.5"  stroke-dashoffset="22.5"/>
    <line class="bar" style="animation-delay:0.84s" x1="591.25" y1="200.5" x2="591.25" y2="164.05" stroke-dasharray="36.45" stroke-dashoffset="36.45"/>
    <line class="bar" style="animation-delay:0.93s" x1="605.75" y1="200.5" x2="605.75" y2="186.55" stroke-dasharray="13.95" stroke-dashoffset="13.95"/>
    <line class="bar" style="animation-delay:1.02s" x1="620.25" y1="200.5" x2="620.25" y2="163.6"  stroke-dasharray="36.9"  stroke-dashoffset="36.9"/>
    <line class="bar" style="animation-delay:1.11s" x1="634.75" y1="200.5" x2="634.75" y2="156.85" stroke-dasharray="43.65" stroke-dashoffset="43.65"/>
    <line class="bar" style="animation-delay:1.2s"  x1="649.25" y1="200.5" x2="649.25" y2="167.2"  stroke-dasharray="33.3"  stroke-dashoffset="33.3"/>
    <line class="bar" style="animation-delay:1.29s" x1="663.75" y1="200.5" x2="663.75" y2="145.6"  stroke-dasharray="54.9"  stroke-dashoffset="54.9"/>
    <line class="bar" style="animation-delay:1.38s" x1="678.25" y1="200.5" x2="678.25" y2="135.25" stroke-dasharray="65.25" stroke-dashoffset="65.25"/>
    <line class="bar" style="animation-delay:1.47s" x1="692.75" y1="200.5" x2="692.75" y2="170.35" stroke-dasharray="30.15" stroke-dashoffset="30.15"/>
    <line class="bar" style="animation-delay:1.56s" x1="707.25" y1="200.5" x2="707.25" y2="150.55" stroke-dasharray="49.95" stroke-dashoffset="49.95"/>
    <line class="bar" style="animation-delay:1.65s" x1="721.75" y1="200.5" x2="721.75" y2="126.7"  stroke-dasharray="73.8"  stroke-dashoffset="73.8"/>
    <line class="bar" style="animation-delay:1.74s" x1="736.25" y1="200.5" x2="736.25" y2="138.85" stroke-dasharray="61.65" stroke-dashoffset="61.65"/>
    <line class="bar" style="animation-delay:1.83s" x1="750.75" y1="200.5" x2="750.75" y2="123.1"  stroke-dasharray="77.4"  stroke-dashoffset="77.4"/>
    <line class="bar" style="animation-delay:1.92s" x1="765.25" y1="200.5" x2="765.25" y2="150.55" stroke-dasharray="49.95" stroke-dashoffset="49.95"/>
    <line class="bar" style="animation-delay:2.01s" x1="779.75" y1="200.5" x2="779.75" y2="152.8"  stroke-dasharray="47.7"  stroke-dashoffset="47.7"/>
    <line class="bar" style="animation-delay:2.1s"  x1="794.25" y1="200.5" x2="794.25" y2="41.2"   stroke-dasharray="159.3" stroke-dashoffset="159.3"/>
    <line class="bar" style="animation-delay:2.19s" x1="808.75" y1="200.5" x2="808.75" y2="123.55" stroke-dasharray="76.95" stroke-dashoffset="76.95"/>
