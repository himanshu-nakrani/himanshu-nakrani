<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 252" width="880" height="252" role="img" aria-labelledby="t">
  <title id="t">Horizontal bar chart of language share by bytes across 52 public source repos as of July 2026: Jupyter Notebook 45.1 percent (flagged with a dagger for inflated notebook bytes), TypeScript 37.5, Python 6.5, HTML 3.9, MDX 2.3, CSS 2.2, JavaScript 2.0, other 0.4.</title>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .txt  { fill: #95a0ac; }
    .ink  { stroke: #8b949e; }
    .bar  { stroke: #7d97ee; stroke-width: 9; stroke-linecap: butt; fill: none; stroke-opacity: 0.8; }
    .bara { stroke: #d29922; stroke-opacity: 0.75; }
    .fade { opacity: 0; animation: fadein 0.8s cubic-bezier(0.33,0,0.2,1) forwards; }
    .d0 { animation-delay: 0.05s; }
    .n0 { animation-delay: 0.5s;  }
    .n1 { animation-delay: 0.72s; }
    .n2 { animation-delay: 0.94s; }
    .n3 { animation-delay: 1.16s; }
    .n4 { animation-delay: 1.38s; }
    .n5 { animation-delay: 1.6s;  }
    .n6 { animation-delay: 1.82s; }
    .n7 { animation-delay: 2.04s; }
    .p0 { animation-delay: 1.7s;  }
    .p1 { animation-delay: 1.75s; }
    .p2 { animation-delay: 1.5s;  }
    .p3 { animation-delay: 1.65s; }
    .p4 { animation-delay: 1.85s; }
    .p5 { animation-delay: 2.05s; }
    .p6 { animation-delay: 2.25s; }
    .p7 { animation-delay: 2.45s; }
    .bd0 { stroke-dasharray: 520;   stroke-dashoffset: 520;   animation: draw 1.15s cubic-bezier(0.33,0,0.2,1) 0.5s forwards; }
    .bd1 { stroke-dasharray: 432.4; stroke-dashoffset: 432.4; animation: draw 1.0s  cubic-bezier(0.33,0,0.2,1) 0.72s forwards; }
    .bd2 { stroke-dasharray: 75.1;  stroke-dashoffset: 75.1;  animation: draw 0.5s  cubic-bezier(0.33,0,0.2,1) 0.94s forwards; }
    .bd3 { stroke-dasharray: 44.6;  stroke-dashoffset: 44.6;  animation: draw 0.45s cubic-bezier(0.33,0,0.2,1) 1.16s forwards; }
    .bd4 { stroke-dasharray: 26.5;  stroke-dashoffset: 26.5;  animation: draw 0.4s  cubic-bezier(0.33,0,0.2,1) 1.38s forwards; }
    .bd5 { stroke-dasharray: 25.3;  stroke-dashoffset: 25.3;  animation: draw 0.4s  cubic-bezier(0.33,0,0.2,1) 1.6s forwards; }
    .bd6 { stroke-dasharray: 23.6;  stroke-dashoffset: 23.6;  animation: draw 0.4s  cubic-bezier(0.33,0,0.2,1) 1.82s forwards; }
    .bd7 { stroke-dasharray: 4.9;   stroke-dashoffset: 4.9;   animation: draw 0.35s cubic-bezier(0.33,0,0.2,1) 2.04s forwards; }
    @keyframes draw   { to { stroke-dashoffset: 0; } }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .fade { animation: none; opacity: 1; }
      .bar  { animation: none; stroke-dashoffset: 0; }
    }
  </style>

