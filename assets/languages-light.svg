<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 124" width="880" height="124" role="img" aria-labelledby="t3">
  <title id="t3">A single horizontal stacked bar of code bytes by language across 52 source repositories: Jupyter Notebook 45.1 percent, flagged as byte-inflated by embedded cell outputs, TypeScript 37.5 percent, Python 6.5 percent, then HTML, MDX, CSS, JavaScript, and other.</title>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .txt { fill: #6e7781; }
    .ink { stroke: #6e7781; }
    .fillg {
      transform-box: fill-box; transform-origin: left center;
      transform: scaleX(0);
      animation: growx 1.7s cubic-bezier(0.45,0.05,0.4,1) 0.4s forwards;
    }
    .fade { opacity: 0; animation: fadein 0.7s cubic-bezier(0.33,0,0.2,1) forwards; }
    .d0 { animation-delay: 0.05s; }
    .d1 { animation-delay: 2.05s; }
    .d2 { animation-delay: 2.4s;  }
    @keyframes growx  { to { transform: scaleX(1); } }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .fillg { animation: none; transform: none; }
      .fade  { animation: none; opacity: 1; }
    }
  </style>

  <!-- frame: header row, empty track, scale ticks -->
  <g class="fade d0">
    <text class="txt" x="52" y="24" font-size="11" letter-spacing="1.5">bytes by language</text>
    <text class="txt" x="824" y="24" font-size="9" letter-spacing="1" text-anchor="end" opacity="0.65">34,033,406 bytes &#183; 52 source repos &#183; forks excluded</text>
    <rect class="ink" x="63.5" y="51.5" width="753" height="21.0" fill="none" stroke-width="0.75" opacity="0.45"/>
    <g class="ink" stroke-width="1" opacity="0.8">
      <line x1="64" y1="72.5" x2="64" y2="77.0"/>
      <line x1="252" y1="72.5" x2="252" y2="77.0"/>
      <line x1="440" y1="72.5" x2="440" y2="77.0"/>
      <line x1="628" y1="72.5" x2="628" y2="77.0"/>
      <line x1="816" y1="72.5" x2="816" y2="77.0"/>
    </g>
    <text class="txt" x="64" y="89.0" font-size="9" text-anchor="middle" opacity="0.7">0</text>
    <text class="txt" x="252" y="89.0" font-size="9" text-anchor="middle" opacity="0.7">25</text>
    <text class="txt" x="440" y="89.0" font-size="9" text-anchor="middle" opacity="0.7">50</text>
    <text class="txt" x="628" y="89.0" font-size="9" text-anchor="middle" opacity="0.7">75</text>
    <text class="txt" x="816" y="89.0" font-size="9" text-anchor="middle" opacity="0.7">100%</text>
  </g>

  <!-- the stacked bar, filling once, left to right -->
  <g class="fillg">
    <rect x="64.0" y="52.0" width="339.39" height="20.0" fill="#bf8700" fill-opacity="0.6"/>
    <rect x="403.39" y="52.0" width="282.18" height="20.0" fill="#4f6ad0" fill-opacity="0.9"/>
    <rect x="685.57" y="52.0" width="49.0" height="20.0" fill="#4f6ad0" fill-opacity="0.68"/>
    <rect x="734.57" y="52.0" width="29.1" height="20.0" fill="#4f6ad0" fill-opacity="0.5"/>
    <rect x="763.67" y="52.0" width="17.32" height="20.0" fill="#4f6ad0" fill-opacity="0.38"/>
    <rect x="780.99" y="52.0" width="16.5" height="20.0" fill="#4f6ad0" fill-opacity="0.28"/>
    <rect x="797.49" y="52.0" width="15.39" height="20.0" fill="#4f6ad0" fill-opacity="0.18"/>
    <rect x="812.89" y="52.0" width="3.11" height="20.0" fill="#4f6ad0" fill-opacity="0.1"/>
  </g>

  <!-- major segment labels -->
  <g class="fade d1">
    <line class="ink" x1="233.7" y1="46" x2="233.7" y2="50.5" stroke-width="0.75" opacity="0.5"/>
    <text class="txt" x="233.7" y="42" font-size="10.5" text-anchor="middle">jupyter&#8224; &#8212; 45.1%</text>
    <line class="ink" x1="544.5" y1="46" x2="544.5" y2="50.5" stroke-width="0.75" opacity="0.5"/>
    <text class="txt" x="544.5" y="42" font-size="10.5" text-anchor="middle">typescript &#8212; 37.5%</text>
  </g>

  <!-- tail legend -->
  <g class="fade d2">
    <rect x="64.0" y="100" width="7" height="7" fill="#4f6ad0" fill-opacity="0.68"/>
    <text class="txt" x="75.0" y="107" font-size="9.5" opacity="0.85">python 6.5%</text>
    <rect x="165.4" y="100" width="7" height="7" fill="#4f6ad0" fill-opacity="0.5"/>
    <text class="txt" x="176.4" y="107" font-size="9.5" opacity="0.85">html 3.9%</text>
    <rect x="255.4" y="100" width="7" height="7" fill="#4f6ad0" fill-opacity="0.38"/>
    <text class="txt" x="266.4" y="107" font-size="9.5" opacity="0.85">mdx 2.3%</text>
    <rect x="339.7" y="100" width="7" height="7" fill="#4f6ad0" fill-opacity="0.28"/>
    <text class="txt" x="350.7" y="107" font-size="9.5" opacity="0.85">css 2.2%</text>
    <rect x="424.0" y="100" width="7" height="7" fill="#4f6ad0" fill-opacity="0.18"/>
    <text class="txt" x="435.0" y="107" font-size="9.5" opacity="0.85">javascript 2.0%</text>
    <rect x="548.2" y="100" width="7" height="7" fill="#4f6ad0" fill-opacity="0.1"/>
    <text class="txt" x="559.2" y="107" font-size="9.5" opacity="0.85">other 0.4%</text>
  </g>
</svg>
