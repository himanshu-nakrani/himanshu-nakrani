<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 216" width="880" height="216" role="img" aria-labelledby="t">
  <title id="t">LoRA rank decomposition: a large hatched frozen matrix W0 of size d by d, plus the product of two thin trainable slivers, B of size d by r and A of size r by d, with r much smaller than d. Annotated with the update rule and the parameter count d squared versus 2 d r.</title>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .txt  { fill: #95a0ac; }
    .txa  { fill: #d29922; }
    .ink  { stroke: #8b949e; }
    .tick { stroke: #d29922; }
    .mtx {
      stroke: #7d97ee; fill: #7d97ee; stroke-width: 1.25;
      stroke-linejoin: round; fill-opacity: 0;
      stroke-dasharray: 300; stroke-dashoffset: 300;
      animation: draw 1.0s cubic-bezier(0.45,0.05,0.55,0.95) forwards,
                 fillin 0.7s cubic-bezier(0.33,0,0.2,1) forwards;
    }
    .mb { animation-delay: 1.1s, 1.75s; }
    .ma { animation-delay: 1.9s, 2.55s; }
    .fade { opacity: 0; animation: fadein 0.8s cubic-bezier(0.33,0,0.2,1) forwards; }
    .d0 { animation-delay: 0.05s; }
    .dp { animation-delay: 0.8s; }
    .lb { animation-delay: 1.6s; }
    .la { animation-delay: 2.4s; }
    .f1 { animation-delay: 2.9s; }
    .f2 { animation-delay: 3.5s; }
    .f3 { animation-delay: 4.1s; }
    .f4 { animation-delay: 4.7s; }
    @keyframes draw   { to { stroke-dashoffset: 0; } }
    @keyframes fillin { to { fill-opacity: 0.45; } }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .mtx  { animation: none; stroke-dashoffset: 0; fill-opacity: 0.45; }
      .fade { animation: none; opacity: 1; }
    }
  </style>

  <defs>
    <pattern id="h" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" class="ink" stroke-width="0.75" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- W0: the frozen weights -->
  <g class="fade d0">
    <text class="txt" x="161" y="35" font-size="11" letter-spacing="2" text-anchor="middle" opacity="0.9">frozen</text>
    <rect x="96" y="48" width="130" height="130" rx="1" fill="url(#h)"/>
    <rect x="96" y="48" width="130" height="130" rx="1" class="ink" fill="none" stroke-width="1" opacity="0.8"/>
    <g class="ink" stroke-width="0.75" opacity="0.5">
      <line x1="84" y1="48" x2="84" y2="106"/>
      <line x1="84" y1="130" x2="84" y2="178"/>
      <line x1="81.5" y1="48" x2="86.5" y2="48"/>
      <line x1="81.5" y1="178" x2="86.5" y2="178"/>
    </g>
    <text class="txt" x="84" y="122" font-size="10.5" text-anchor="middle" opacity="0.75">d</text>
    <text class="txt" x="161" y="196" font-size="10.5" text-anchor="middle" opacity="0.85">W<tspan dy="2.5" font-size="8">0</tspan><tspan dy="-2.5"> &#183; d&#215;d</tspan></text>
  </g>

  <text class="txt fade dp" x="258" y="118" font-size="15" text-anchor="middle" opacity="0.9">+</text>

  <!-- B: d x r -->
  <rect class="mtx mb" x="290" y="48" width="18" height="130" rx="1"/>
  <g class="fade lb">
    <text class="txt" x="299" y="196" font-size="10.5" text-anchor="middle" opacity="0.85">B &#183; d&#215;r</text>
  </g>

  <!-- A: r x d -->
  <rect class="mtx ma" x="330" y="104" width="130" height="18" rx="1"/>
  <g class="fade la">
    <text class="txa" x="375" y="35" font-size="11" letter-spacing="2" text-anchor="middle" opacity="0.9">trainable</text>
    <g class="tick" stroke-width="0.75" opacity="0.5">
      <line x1="290" y1="42" x2="460" y2="42"/>
      <line x1="290" y1="42" x2="290" y2="45"/>
      <line x1="460" y1="42" x2="460" y2="45"/>
    </g>
    <g class="tick" stroke-width="0.75" opacity="0.8">
      <line x1="470" y1="104" x2="470" y2="122"/>
      <line x1="467" y1="104" x2="473" y2="104"/>
      <line x1="467" y1="122" x2="473" y2="122"/>
    </g>
    <text class="txa" x="478" y="117" font-size="10.5" opacity="0.9">r</text>
    <text class="txt" x="395" y="140" font-size="10.5" text-anchor="middle" opacity="0.85">A &#183; r&#215;d</text>
    <text class="txa" x="395" y="158" font-size="10.5" text-anchor="middle" opacity="0.9">r &#8810; d</text>
  </g>

  <!-- the math -->
  <text class="txt fade f1" x="520" y="78" font-size="13">W&#8242; = W<tspan dy="3" font-size="9.5">0</tspan><tspan dy="-3"> + B&#183;A</tspan></text>
  <text class="txt fade f2" x="520" y="106" font-size="12">rank(B&#183;A) &#8804; r</text>
  <text class="txt fade f3" x="520" y="134" font-size="12">trainable params: d<tspan dy="-4.5" font-size="9">2</tspan><tspan dy="4.5"> &#8594; 2&#183;d&#183;r</tspan></text>
  <text class="txt fade f4" x="520" y="162" font-size="10.5" opacity="0.75">merged into W<tspan dy="2.5" font-size="8">0</tspan><tspan dy="-2.5"> at inference &#8212; no extra latency</tspan></text>
</svg>
