<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 256" width="420" height="256" role="img" aria-labelledby="t">
  <title id="t">Schematic plate of Code-Agent-Pro: a task flows through plan, write, and test stages, tests run inside a dashed sandbox, a dashed arc labeled fail-iterate loops back to plan, and the run exits at an amber dot labeled tests pass.</title>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .txt  { fill: #95a0ac; }
    .ink  { stroke: #8b949e; }
    .dotf  { fill: #d29922; }
    .ring  { stroke: #d29922; fill: none; }
    .wire { fill: none; stroke-width: 1; stroke-linecap: round; opacity: 0.7; }
    .fade { opacity: 0; animation: fadein 0.8s cubic-bezier(0.33,0,0.2,1) forwards; }
    .d0 { animation-delay: 0.05s; }
    .d1 { animation-delay: 0.5s;  }
    .d2 { animation-delay: 1.25s; }
    .d3 { animation-delay: 2.0s;  }
    .d4 { animation-delay: 2.7s;  }
    .d5 { animation-delay: 3.4s;  }
    .d6 { animation-delay: 4.3s;  }
    .d7 { animation-delay: 4.6s;  }
    .d8 { animation-delay: 5.0s;  }
    .w1 { stroke-dasharray: 18; stroke-dashoffset: 18; animation: draw 0.45s cubic-bezier(0.33,0,0.2,1) 0.9s forwards; }
    .w2 { stroke-dasharray: 18; stroke-dashoffset: 18; animation: draw 0.45s cubic-bezier(0.33,0,0.2,1) 1.65s forwards; }
    .w3 { stroke-dasharray: 16; stroke-dashoffset: 16; animation: draw 0.45s cubic-bezier(0.33,0,0.2,1) 2.4s forwards; }
    .w4 { stroke-dasharray: 16; stroke-dashoffset: 16; animation: draw 0.4s cubic-bezier(0.33,0,0.2,1) 3.95s forwards; }
    @keyframes draw   { to { stroke-dashoffset: 0; } }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .fade { animation: none; opacity: 1; }
      .w1, .w2, .w3, .w4 { animation: none; stroke-dashoffset: 0; }
      .ring { display: none; }
    }
  </style>

  <!-- plate frame + running heads -->
  <g class="fade d0">
    <rect x="10.5" y="10.5" width="399" height="235" rx="2" class="ink" fill="none" stroke-width="0.75" opacity="0.5"/>
    <text class="txt" x="26" y="36" font-size="11" letter-spacing="2" opacity="0.9">code-agent-pro</text>
    <text class="txt" x="394" y="36" font-size="9" letter-spacing="1.5" text-anchor="end" opacity="0.65">plate iii</text>
  </g>

  <!-- task in -->
  <text class="txt fade d1" x="26" y="132" font-size="10" letter-spacing="1.5" opacity="0.9">task</text>

  <line class="ink wire w1" x1="60" y1="128" x2="78" y2="128"/>

  <!-- plan -->
  <g class="fade d2">
    <path class="ink" d="M78 124.5 L82.5 128 L78 131.5" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <rect x="86" y="111" width="58" height="34" rx="2" class="ink" fill="none" stroke-width="0.75" opacity="0.6"/>
    <text class="txt" x="115" y="132" font-size="10" letter-spacing="1.5" text-anchor="middle" opacity="0.9">plan</text>
  </g>

  <line class="ink wire w2" x1="148" y1="128" x2="166" y2="128"/>

  <!-- write -->
  <g class="fade d3">
    <path class="ink" d="M166 124.5 L170.5 128 L166 131.5" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <rect x="174" y="111" width="58" height="34" rx="2" class="ink" fill="none" stroke-width="0.75" opacity="0.6"/>
    <text class="txt" x="203" y="132" font-size="10" letter-spacing="1.5" text-anchor="middle" opacity="0.9">write</text>
  </g>

  <line class="ink wire w3" x1="236" y1="128" x2="252" y2="128"/>

  <!-- test, inside the sandbox -->
  <g class="fade d4">
    <path class="ink" d="M252 124.5 L256.5 128 L252 131.5" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <rect x="260.5" y="103.5" width="73" height="49" rx="2" class="ink" fill="none" stroke-width="0.75" stroke-dasharray="3 4" opacity="0.45"/>
    <rect x="268" y="111" width="58" height="34" rx="2" class="ink" fill="none" stroke-width="0.75" opacity="0.6"/>
    <text class="txt" x="297" y="132" font-size="10" letter-spacing="1.5" text-anchor="middle" opacity="0.9">test</text>
    <text class="txt" x="297" y="97" font-size="8" letter-spacing="1.5" text-anchor="middle" opacity="0.6">sandbox</text>
  </g>

  <!-- the loop back -->
  <g class="fade d5">
    <path class="ink" d="M297 156 C297 198 115 198 115 149" fill="none" stroke-width="0.75" stroke-dasharray="3 4" opacity="0.5"/>
    <path class="ink" d="M111.5 154.5 L115 149 L118.5 154.5" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <text class="txt" x="206" y="205" font-size="9" letter-spacing="1" text-anchor="middle" opacity="0.75">fail &#8594; iterate</text>
  </g>

  <line class="ink wire w4" x1="336" y1="128" x2="352" y2="128"/>

  <!-- exit: tests pass -->
  <circle class="dotf fade d6" cx="360" cy="128" r="3.2"/>
  <circle class="ring" cx="360" cy="128" r="3.5" stroke-width="1" opacity="0">
    <animate attributeName="r" values="3.5;11" keyTimes="0;1" dur="1.4s" begin="4.45s" repeatCount="1" calcMode="spline" keySplines="0.25 0 0.4 1"/>
    <animate attributeName="opacity" values="0.55;0" keyTimes="0;1" dur="1.4s" begin="4.45s" repeatCount="1" calcMode="spline" keySplines="0.25 0 0.4 1"/>
  </circle>
  <text class="txt fade d7" x="364" y="163" font-size="9.5" letter-spacing="1" text-anchor="middle" opacity="0.85">tests pass</text>

  <text class="txt fade d8" x="394" y="234" font-size="8.5" letter-spacing="0.5" text-anchor="end" opacity="0.6">react &#183; express &#183; postgres</text>
</svg>
