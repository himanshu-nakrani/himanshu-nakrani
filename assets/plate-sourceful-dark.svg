<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 256" width="420" height="256" role="img" aria-labelledby="t">
  <title id="t">Schematic plate of sourceful: documents are chunked and embedded into a pgvector store; a query retrieves top-k chunks; an answer streams out line by line with amber citation markers.</title>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .txt  { fill: #95a0ac; }
    .ink  { stroke: #8b949e; }
    .cellb { fill: #7d97ee; }
    .dotf  { fill: #d29922; }
    .ring  { stroke: #d29922; fill: none; }
    .cite  { fill: #d29922; }
    .stream { stroke: #7d97ee; fill: none; stroke-width: 1.4; stroke-linecap: round; opacity: 0.9; }
    .wire { fill: none; stroke-width: 1; stroke-linecap: round; opacity: 0.7; }
    .fade { opacity: 0; animation: fadein 0.8s cubic-bezier(0.33,0,0.2,1) forwards; }
    .d0  { animation-delay: 0.05s; }
    .d1  { animation-delay: 0.5s;  }
    .d2  { animation-delay: 1.3s;  }
    .d3  { animation-delay: 2.0s;  }
    .d4  { animation-delay: 2.6s;  }
    .d5  { animation-delay: 3.25s; }
    .d6  { animation-delay: 3.55s; }
    .d7  { animation-delay: 4.4s;  }
    .d8  { animation-delay: 5.2s;  }
    .d9  { animation-delay: 5.55s; }
    .d10 { animation-delay: 5.0s;  }
    .w1 { stroke-dasharray: 18; stroke-dashoffset: 18; animation: draw 0.45s cubic-bezier(0.33,0,0.2,1) 0.95s forwards; }
    .w2 { stroke-dasharray: 15; stroke-dashoffset: 15; animation: draw 0.45s cubic-bezier(0.33,0,0.2,1) 1.7s forwards; }
    .w3 { stroke-dasharray: 24; stroke-dashoffset: 24; animation: draw 0.45s cubic-bezier(0.33,0,0.2,1) 3.1s forwards; }
    .s1 { stroke-dasharray: 84;  stroke-dashoffset: 84;  animation: draw 0.45s cubic-bezier(0.45,0.05,0.55,0.95) 3.95s forwards; }
    .s2 { stroke-dasharray: 122; stroke-dashoffset: 122; animation: draw 0.5s  cubic-bezier(0.45,0.05,0.55,0.95) 4.35s forwards; }
    .s3 { stroke-dasharray: 76;  stroke-dashoffset: 76;  animation: draw 0.45s cubic-bezier(0.45,0.05,0.55,0.95) 4.75s forwards; }
    .s4 { stroke-dasharray: 52;  stroke-dashoffset: 52;  animation: draw 0.4s  cubic-bezier(0.45,0.05,0.55,0.95) 5.15s forwards; }
    @keyframes draw   { to { stroke-dashoffset: 0; } }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .fade { animation: none; opacity: 1; }
      .w1, .w2, .w3, .s1, .s2, .s3, .s4 { animation: none; stroke-dashoffset: 0; }
      .ring { display: none; }
    }
  </style>

  <!-- plate frame + running heads -->
  <g class="fade d0">
    <rect x="10.5" y="10.5" width="399" height="235" rx="2" class="ink" fill="none" stroke-width="0.75" opacity="0.5"/>
    <text class="txt" x="26" y="36" font-size="11" letter-spacing="2" opacity="0.9">sourceful</text>
    <text class="txt" x="394" y="36" font-size="9" letter-spacing="1.5" text-anchor="end" opacity="0.65">plate ii</text>
  </g>

  <!-- documents in -->
  <g class="fade d1">
    <path class="ink" d="M36 118 H64 V156" fill="none" stroke-width="0.75" opacity="0.45"/>
    <rect x="26" y="124" width="30" height="40" rx="1.5" class="ink" fill="none" stroke-width="0.75" opacity="0.8"/>
    <g class="ink" stroke-width="0.75" opacity="0.5">
      <line x1="32" y1="134" x2="50" y2="134"/>
      <line x1="32" y1="141" x2="50" y2="141"/>
      <line x1="32" y1="148" x2="50" y2="148"/>
      <line x1="32" y1="155" x2="44" y2="155"/>
    </g>
    <text class="txt" x="45" y="208" font-size="9.5" letter-spacing="1.5" text-anchor="middle" opacity="0.75">docs</text>
  </g>

  <line class="ink wire w1" x1="68" y1="142" x2="86" y2="142"/>

  <!-- chunk + embed -->
  <g class="fade d2">
    <path class="ink" d="M86 138.5 L90.5 142 L86 145.5" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <rect x="98"  y="126" width="9" height="9" rx="1.5" class="cellb" fill-opacity="0.9"/>
    <rect x="109" y="126" width="9" height="9" rx="1.5" class="cellb" fill-opacity="0.45"/>
    <rect x="120" y="126" width="9" height="9" rx="1.5" class="cellb" fill-opacity="0.7"/>
    <rect x="98"  y="137" width="9" height="9" rx="1.5" class="cellb" fill-opacity="0.3"/>
    <rect x="109" y="137" width="9" height="9" rx="1.5" class="cellb" fill-opacity="0.8"/>
    <rect x="120" y="137" width="9" height="9" rx="1.5" class="cellb" fill-opacity="0.5"/>
    <rect x="98"  y="148" width="9" height="9" rx="1.5" class="cellb" fill-opacity="0.65"/>
    <rect x="109" y="148" width="9" height="9" rx="1.5" class="cellb" fill-opacity="0.25"/>
    <rect x="120" y="148" width="9" height="9" rx="1.5" class="cellb" fill-opacity="0.85"/>
    <text class="txt" x="113.5" y="208" font-size="9.5" letter-spacing="1.5" text-anchor="middle" opacity="0.75">chunks</text>
  </g>

  <line class="ink wire w2" x1="137" y1="142" x2="152" y2="142"/>

  <!-- pgvector store -->
  <g class="fade d3">
    <path class="ink" d="M152 138.5 L156.5 142 L152 145.5" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <ellipse cx="188" cy="120" rx="24" ry="7.5" class="ink" fill="none" stroke-width="0.75" opacity="0.8"/>
    <line class="ink" x1="164" y1="120" x2="164" y2="164" stroke-width="0.75" opacity="0.8"/>
    <line class="ink" x1="212" y1="120" x2="212" y2="164" stroke-width="0.75" opacity="0.8"/>
    <path class="ink" d="M164 164 A24 7.5 0 0 0 212 164" fill="none" stroke-width="0.75" opacity="0.8"/>
    <rect x="172" y="133" width="7" height="7" rx="1" class="cellb" fill-opacity="0.75"/>
    <rect x="185" y="144" width="7" height="7" rx="1" class="cellb" fill-opacity="0.45"/>
    <rect x="196" y="132" width="7" height="7" rx="1" class="cellb" fill-opacity="0.85"/>
    <rect x="176" y="152" width="7" height="7" rx="1" class="cellb" fill-opacity="0.3"/>
    <text class="txt" x="188" y="208" font-size="9.5" letter-spacing="1.5" text-anchor="middle" opacity="0.75">pgvector</text>
  </g>

  <!-- query drops in -->
  <g class="fade d4">
    <text class="txt" x="300" y="62" font-size="10" letter-spacing="1.5" text-anchor="middle" opacity="0.9">query</text>
    <path class="ink" d="M288 68 Q236 80 202 106" fill="none" stroke-width="0.75" stroke-dasharray="3 4" opacity="0.55"/>
    <path class="ink" d="M207.4 105.1 L202 106 L204.3 101" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <line class="ink wire w3" x1="220" y1="142" x2="244" y2="142"/>
  <text class="txt fade d5" x="232" y="133" font-size="8.5" letter-spacing="1" text-anchor="middle" opacity="0.7">top-k</text>

  <!-- cited, streaming answer -->
  <g class="fade d6">
    <path class="ink" d="M244 138.5 L248.5 142 L244 145.5" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <rect x="252" y="108" width="142" height="78" rx="2" class="ink" fill="none" stroke-width="0.75" opacity="0.5"/>
    <text class="txt" x="323" y="208" font-size="9.5" letter-spacing="1.5" text-anchor="middle" opacity="0.75">cited answers</text>
  </g>
  <line class="stream s1" x1="262" y1="126" x2="346" y2="126"/>
  <text class="cite fade d7" x="352" y="129" font-size="7.5" opacity="0.9">[1]</text>
  <line class="stream s2" x1="262" y1="142" x2="384" y2="142"/>
  <line class="stream s3" x1="262" y1="158" x2="338" y2="158"/>
  <text class="cite fade d8" x="344" y="161" font-size="7.5" opacity="0.9">[2]</text>
  <line class="stream s4" x1="262" y1="174" x2="314" y2="174"/>

  <circle class="dotf fade d9" cx="320" cy="174" r="3"/>
  <circle class="ring" cx="320" cy="174" r="3.5" stroke-width="1" opacity="0">
    <animate attributeName="r" values="3.5;11" keyTimes="0;1" dur="1.2s" begin="5.65s" repeatCount="1" calcMode="spline" keySplines="0.25 0 0.4 1"/>
    <animate attributeName="opacity" values="0.55;0" keyTimes="0;1" dur="1.2s" begin="5.65s" repeatCount="1" calcMode="spline" keySplines="0.25 0 0.4 1"/>
  </circle>

  <text class="txt fade d10" x="394" y="234" font-size="8.5" letter-spacing="0.5" text-anchor="end" opacity="0.6">next.js &#183; fastapi &#183; postgres + pgvector</text>
</svg>
