<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 196" width="880" height="196" role="img" aria-labelledby="t">
  <title id="t">A signal-flow schematic of sourceful's retrieval path — query, embed, pgvector, answer — with one pulse traveling the path once and ending at a citation mark.</title>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .txt   { fill: #6e7781; }
    .ink   { stroke: #6e7781; }
    .cellb { fill: #4f6ad0; }
    .sig   { stroke: #4f6ad0; }
    .pulse { fill: #4f6ad0; }
    .dotf  { fill: #bf8700; }
    .gold  { stroke: #bf8700; fill: none; }
    .ring  { stroke: #bf8700; fill: none; }
    .c {
      stroke-dasharray: 58; stroke-dashoffset: 58;
      animation: draw 0.35s cubic-bezier(0.33,0,0.2,1) forwards;
    }
    .fade { opacity: 0; animation: fadein 0.8s cubic-bezier(0.33,0,0.2,1) forwards; }
    .d0 { animation-delay: 0.05s; }
    .d1 { animation-delay: 0.3s;  }
    .d2 { animation-delay: 0.6s;  }
    .d3 { animation-delay: 0.9s;  }
    .d4 { animation-delay: 1.2s;  }
    .d5 { animation-delay: 1.35s; }
    .c1 { animation-delay: 1.6s;  }
    .k1 { animation-delay: 1.9s;  }
    .c2 { animation-delay: 2.0s;  }
    .k2 { animation-delay: 2.3s;  }
    .c3 { animation-delay: 2.4s;  }
    .k3 { animation-delay: 2.7s;  }
    .s1 { animation-delay: 4.0s;  }
    .s2 { animation-delay: 4.35s; }
    .d6 { animation-delay: 4.55s; }
    @keyframes draw   { to { stroke-dashoffset: 0; } }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .c     { animation: none; stroke-dashoffset: 0; }
      .fade  { animation: none; opacity: 1; }
      .pulse { display: none; }
      .ring  { display: none; }
    }
  </style>

  <!-- frame: time axis, stage ticks -->
  <g class="fade d0">
    <g class="ink" stroke-width="1" opacity="0.8">
      <line x1="64" y1="156.5" x2="800" y2="156.5"/>
      <line x1="116" y1="156.5" x2="116" y2="162"/>
      <line x1="284" y1="156.5" x2="284" y2="162"/>
      <line x1="464" y1="156.5" x2="464" y2="162"/>
      <line x1="666" y1="156.5" x2="666" y2="162"/>
    </g>
    <text class="txt" x="800" y="178" font-size="11" letter-spacing="1.5" text-anchor="end">time &#8594;</text>
  </g>

  <!-- stage 1: query -->
  <g class="fade d1">
    <rect x="64" y="76" width="104" height="48" rx="2" class="ink" fill="none" stroke-width="1" opacity="0.55"/>
    <text class="txt" x="116" y="95" font-size="11" letter-spacing="1.5" text-anchor="middle" opacity="0.9">query</text>
    <line class="ink" x1="84" y1="107.5" x2="138" y2="107.5" stroke-width="1" opacity="0.3"/>
    <rect x="141" y="102.5" width="3.5" height="9" rx="0.5" class="cellb" fill-opacity="0.75"/>
    <text class="txt" x="116" y="141" font-size="9.5" text-anchor="middle" opacity="0.7">workspace-scoped</text>
  </g>

  <!-- stage 2: embed -->
  <g class="fade d2">
    <rect x="232" y="76" width="104" height="48" rx="2" class="ink" fill="none" stroke-width="1" opacity="0.55"/>
    <text class="txt" x="284" y="95" font-size="11" letter-spacing="1.5" text-anchor="middle" opacity="0.9">embed</text>
    <rect x="260" y="102" width="8" height="8" rx="1.5" class="cellb" fill-opacity="0.9"/>
    <rect x="270" y="102" width="8" height="8" rx="1.5" class="cellb" fill-opacity="0.5"/>
    <rect x="280" y="102" width="8" height="8" rx="1.5" class="cellb" fill-opacity="0.28"/>
    <rect x="290" y="102" width="8" height="8" rx="1.5" class="cellb" fill-opacity="0.62"/>
    <rect x="300" y="102" width="8" height="8" rx="1.5" class="cellb" fill-opacity="0.42"/>
    <text class="txt" x="284" y="141" font-size="9.5" text-anchor="middle" opacity="0.7">text &#8594; vector</text>
  </g>

  <!-- stage 3: pgvector, with a nearest-neighbor inset -->
  <g class="fade d3">
    <rect x="400" y="76" width="128" height="48" rx="2" class="ink" fill="none" stroke-width="1" opacity="0.55"/>
    <text class="txt" x="464" y="95" font-size="11" letter-spacing="1.5" text-anchor="middle" opacity="0.9">pgvector</text>
    <g class="txt" opacity="0.45">
      <circle cx="420" cy="109" r="1.6"/>
      <circle cx="433" cy="104" r="1.6"/>
      <circle cx="445" cy="114" r="1.6"/>
      <circle cx="478" cy="105" r="1.6"/>
      <circle cx="495" cy="113" r="1.6"/>
      <circle cx="507" cy="107" r="1.6"/>
      <circle cx="430" cy="117" r="1.6"/>
    </g>
    <circle cx="462" cy="110" r="2" class="dotf"/>
    <circle cx="462" cy="110" r="4.5" class="gold" stroke-width="0.75" opacity="0.5"/>
    <text class="txt" x="464" y="141" font-size="9.5" text-anchor="middle" opacity="0.7">similarity search</text>
  </g>

  <!-- stage 4: answer, streaming -->
  <g class="fade d4">
    <rect x="592" y="76" width="148" height="48" rx="2" class="ink" fill="none" stroke-width="1" opacity="0.55"/>
    <text class="txt" x="666" y="92" font-size="11" letter-spacing="1.5" text-anchor="middle" opacity="0.9">answer</text>
    <text class="txt" x="666" y="141" font-size="9.5" text-anchor="middle" opacity="0.7">streamed &#183; cited</text>
  </g>
  <line class="sig fade s1" x1="608" y1="103.5" x2="724" y2="103.5" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>
  <line class="sig fade s2" x1="608" y1="111.5" x2="692" y2="111.5" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- ingestion feed (background path) -->
  <g class="fade d5">
    <text class="txt" x="464" y="25" font-size="9.5" letter-spacing="1" text-anchor="middle" opacity="0.7">docs &#183; background ingestion</text>
    <line class="ink" x1="464" y1="32" x2="464" y2="68" stroke-width="0.75" stroke-dasharray="3 4" opacity="0.5"/>
    <path class="ink" d="M460.5 64.5 L464 70.5 L467.5 64.5" fill="none" stroke-width="0.75" opacity="0.5"/>
  </g>

  <!-- connectors -->
  <line class="ink c c1" x1="168" y1="100" x2="225.5" y2="100" stroke-width="1" opacity="0.7"/>
  <path class="ink fade k1" d="M225.5 96.5 L231.5 100 L225.5 103.5" fill="none" stroke-width="1" opacity="0.7"/>
  <line class="ink c c2" x1="336" y1="100" x2="393.5" y2="100" stroke-width="1" opacity="0.7"/>
  <path class="ink fade k2" d="M393.5 96.5 L399.5 100 L393.5 103.5" fill="none" stroke-width="1" opacity="0.7"/>
  <line class="ink c c3" x1="528" y1="100" x2="585.5" y2="100" stroke-width="1" opacity="0.7"/>
  <path class="ink fade k3" d="M585.5 96.5 L591.5 100 L585.5 103.5" fill="none" stroke-width="1" opacity="0.7"/>

  <!-- the pulse: one trip down the path -->
  <g class="pulse" opacity="0">
    <circle r="6" fill-opacity="0.18"/>
    <circle r="3"/>
    <animateMotion path="M92 100 L744 100" begin="2.9s" dur="1.7s" repeatCount="1" fill="freeze" calcMode="spline" keyTimes="0;1" keyPoints="0;1" keySplines="0.35 0 0.25 1"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.92;1" begin="2.9s" dur="1.7s" repeatCount="1" fill="freeze"/>
  </g>

  <!-- terminus: the citation mark -->
  <text class="dotf fade d6" x="750" y="104" font-size="11.5">[1]</text>
  <circle class="ring" cx="759" cy="100" r="4" stroke-width="1" opacity="0">
    <animate attributeName="r" values="4;13" keyTimes="0;1" dur="1.8s" begin="4.8s" repeatCount="1" calcMode="spline" keySplines="0.25 0 0.4 1"/>
    <animate attributeName="opacity" values="0.5;0" keyTimes="0;1" dur="1.8s" begin="4.8s" repeatCount="1" calcMode="spline" keySplines="0.25 0 0.4 1"/>
  </circle>
</svg>
