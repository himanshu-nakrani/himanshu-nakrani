<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 252" width="880" height="252" role="img" aria-labelledby="t">
  <title id="t">A loss curve drawing itself across three annotated training stages — pretrain, sft, grpo — with a small causal-attention inset, ending at a marked point labeled TinyMathReason-1B.</title>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .txt  { fill: #95a0ac; }
    .ink  { stroke: #8b949e; }
    .curve {
      stroke: #7d97ee; fill: none; stroke-width: 1.4;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 604; stroke-dashoffset: 604;
      animation: draw 4.4s cubic-bezier(0.45,0.05,0.55,0.95) 0.3s forwards;
    }
    .cellb { fill: #7d97ee; }
    .cella { fill: #d29922; }
    .dotf  { fill: #d29922; }
    .ring  { stroke: #d29922; fill: none; }
    .fade { opacity: 0; animation: fadein 0.8s cubic-bezier(0.33,0,0.2,1) forwards; }
    .d0 { animation-delay: 0.05s; }
    .d1 { animation-delay: 1.65s; }
    .d2 { animation-delay: 2.65s; }
    .d3 { animation-delay: 3.45s; }
    .d4 { animation-delay: 3.0s;  }
    .d5 { animation-delay: 4.5s;  }
    .d6 { animation-delay: 4.8s;  }
    @keyframes draw   { to { stroke-dashoffset: 0; } }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .curve { animation: none; stroke-dashoffset: 0; }
      .fade  { animation: none; opacity: 1; }
      .ring  { display: none; }
    }
  </style>

